<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OFAS Chat Assistant</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef3fb;
    }
    .app {
      max-width: 450px;
      height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border-bottom: 1px solid #e5e7eb;
    }
    .header-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #dbeafe;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex: 0 0 auto;
    }
    #title { font-weight: 700; }
    .subtitle { font-size: 12px; color: #666; margin-top: 3px; }
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #f3f6fb;
    }
    .row { display: flex; margin-bottom: 14px; }
    .row.user { justify-content: flex-end; }
    .bubble-wrap {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      max-width: 85%;
    }
    .row.user .bubble-wrap { flex-direction: row-reverse; }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 600;
      flex: 0 0 auto;
    }
    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .row.bot .bubble { background: #fff; border: 1px solid #e5e7eb; }
    .row.user .bubble { background: #2563eb; color: #fff; }
    .composer {
      padding: 12px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      min-height: 42px;
      max-height: 130px;
      border-radius: 14px;
      border: 1px solid #cbd5e1;
      padding: 10px;
      resize: none;
      font-size: 14px;
      outline: none;
    }
    button {
      width: 86px;
      height: 42px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .typing span {
      display: inline-block;
      width: 6px;
      height: 6px;
      margin: 0 2px;
      background: #999;
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    @keyframes blink {
      0%, 80%, 100% { opacity: .3; }
      40% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-avatar" id="headerAvatar">🤖</div>
      <div>
        <div id="title">OFAS Chat Assistant</div>
        <div class="subtitle">ผู้ช่วยด้านการเงินของจุฬาฯ</div>
      </div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="composer">
      <textarea id="input" placeholder="พิมพ์คำถาม..."></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    let CONFIG = {
      botAvatar: '🤖',
      userAvatar: '🙂',
      welcomeMessage: 'สวัสดีค่ะ',
      title: 'OFAS Chat Assistant'
    };

    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    let typingRow = null;

    function ensureId(key, prefix) {
      let value = localStorage.getItem(key);
      if (!value) {
        value = prefix + '_' + crypto.randomUUID();
        localStorage.setItem(key, value);
      }
      return value;
    }

    function getAvatar(role) {
      const v = role === 'bot' ? CONFIG.botAvatar : CONFIG.userAvatar;
      if (v && String(v).trim()) return v;
      return role === 'bot' ? 'AI' : 'U';
    }

    function addMessage(role, text) {
      const row = document.createElement('div');
      row.className = 'row ' + role;

      const wrap = document.createElement('div');
      wrap.className = 'bubble-wrap';

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = getAvatar(role);

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      const container = document.createElement('div');
      container.appendChild(bubble);

      wrap.appendChild(avatar);
      wrap.appendChild(container);
      row.appendChild(wrap);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    function showTyping() {
      hideTyping();
      const row = document.createElement('div');
      row.className = 'row bot';

      const wrap = document.createElement('div');
      wrap.className = 'bubble-wrap';

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = getAvatar('bot');

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.innerHTML = '<span></span><span></span><span></span>';

      bubble.appendChild(typing);
      wrap.appendChild(avatar);
      wrap.appendChild(bubble);
      row.appendChild(wrap);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
      typingRow = row;
    }

    function hideTyping() {
      if (typingRow) typingRow.remove();
      typingRow = null;
    }

    async function send() {
      const text = input.value.trim();
      if (!text || sendBtn.disabled) return;

      addMessage('user', text);
      input.value = '';
      showTyping();
      sendBtn.disabled = true;

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            message: text,
            userId: ensureId('ofas_uid', 'u'),
            sessionId: ensureId('ofas_sid', 's'),
            pageUrl: location.href,
            origin: location.origin
          })
        });

        const res = await response.json().catch(() => null);
        hideTyping();
        addMessage('bot', (res && res.answer) || 'ระบบขัดข้อง');
      } catch (err) {
        hideTyping();
        addMessage('bot', 'เชื่อมต่อไม่สำเร็จ');
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.onclick = send;
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    async function loadConfig() {
      try {
        const response = await fetch('/api/config');
        CONFIG = await response.json();
      } catch (err) {}

      document.title = CONFIG.title || 'OFAS Chat Assistant';
      document.getElementById('title').textContent = CONFIG.title || 'OFAS Chat Assistant';
      document.getElementById('headerAvatar').textContent = CONFIG.botAvatar || '🤖';
      addMessage('bot', CONFIG.welcomeMessage || 'สวัสดีค่ะ');
    }

    loadConfig();
  </script>
</body>
</html>
